---
- name: Create vector user
  ansible.builtin.user:
    name: "{{ vector_user }}"
    system: true
    create_home: false
    shell: /sbin/nologin

- name: Create vector directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vector_user }}"
    group: "{{ vector_user }}"
    mode: "0755"
  loop:
    - "{{ vector_install_dir }}"
    - "{{ vector_config_dir }}"
    - "{{ _vector_log_dir }}"
    - "{{ _vector_data_dir }}"

- name: Download Vector archive
  ansible.builtin.get_url:
    url: "{{ vector_download_url }}"
    dest: "/tmp/vector-{{ vector_version }}.tar.gz"
    mode: "0644"
    timeout: 60
    force: false
    validate_certs: true
  register: vector_download
  retries: 5
  delay: 5
  until: vector_download is succeeded

- name: Extract Vector archive
  ansible.builtin.unarchive:
    src: "/tmp/vector-{{ vector_version }}.tar.gz"
    dest: "{{ vector_install_dir }}"
    remote_src: true
    owner: "{{ vector_user }}"
    group: "{{ vector_user }}"
    mode: "0755"
    extra_opts:
      - "--strip-components=2"

- name: Create symlink to vector binary
  ansible.builtin.file:
    src: "{{ vector_install_dir }}/bin/vector"
    dest: "/usr/local/bin/vector"
    state: link
    mode: "0755"

- name: Deploy Vector configuration
  ansible.builtin.template:
    src: vector.toml.j2
    dest: "{{ vector_config_dir }}/vector.toml"
    owner: "{{ vector_user }}"
    group: "{{ vector_user }}"
    mode: "0644"
  notify: restart vector

- name: Deploy Vector systemd service
  ansible.builtin.template:
    src: vector.service.j2
    dest: "/etc/systemd/system/{{ _vector_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: restart vector

- name: Start and enable Vector service
  ansible.builtin.systemd:
    name: "{{ _vector_service_name }}"
    state: started
    enabled: true
    daemon_reload: true
  when: ansible_service_mgr == "systemd"
